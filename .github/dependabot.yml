# ===========================================
# Dependabot Configuration
# ===========================================
# Automated dependency updates for npm and GitHub Actions

version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 10
    reviewers:
      - "hoangnguyen"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # Group NestJS packages together
      nestjs:
        patterns:
          - "@nestjs/*"
        update-types:
          - "minor"
          - "patch"
      # Group Prisma packages together
      prisma:
        patterns:
          - "@prisma/*"
          - "prisma"
      # Group AWS SDK packages together
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      # Group testing packages together
      testing:
        patterns:
          - "jest"
          - "@types/jest"
          - "ts-jest"
          - "supertest"
          - "@types/supertest"
      # Group linting packages together
      linting:
        patterns:
          - "eslint*"
          - "prettier"
          - "@eslint/*"
          - "typescript-eslint"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-actions:
        patterns: ["*"]
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Ho_Chi_Minh"
    ignore:
      - dependency-name: "node"
        versions: [">= 23.a"]
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
