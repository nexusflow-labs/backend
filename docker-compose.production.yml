# ===========================================
# Docker Compose - Production Environment
# ===========================================
# Usage:
#   docker-compose -f docker-compose.production.yml up -d
#
# This file is for production deployment.
# Use with managed services (RDS, ElastiCache, S3).
# For Kubernetes, use Helm charts or K8s manifests instead.

services:
  api:
    image: ${DOCKER_REGISTRY:-}nexusflow-api:${IMAGE_TAG:-latest}
    container_name: nexusflow-api-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      # Database (managed service - RDS, Cloud SQL)
      DATABASE_URL: ${DATABASE_URL}
      # Redis (managed service - ElastiCache, Redis Cloud)
      REDIS_URL: ${REDIS_URL}
      # JWT (use strong secrets from secret manager)
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      # Cache
      CACHE_TTL_DEFAULT: ${CACHE_TTL_DEFAULT:-600}
      CACHE_TTL_DASHBOARD: ${CACHE_TTL_DASHBOARD:-600}
      # Storage (AWS S3)
      STORAGE_TYPE: s3
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-nexusflow-production-uploads}
      # Queue
      QUEUE_ENABLED: "true"
      QUEUE_PREFIX: nexusflow-prod
      QUEUE_DEFAULT_ATTEMPTS: "5"
      QUEUE_DEFAULT_BACKOFF_DELAY: "2000"
      # Rate Limiting (strict for production)
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-60}
      # Email
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-sendgrid}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      EMAIL_FROM_NAME: "NexusFlow"
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-noreply@nexusflow.com}
      # Frontend
      FRONTEND_URL: ${FRONTEND_URL:-https://app.nexusflow.com}
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN}
      LOG_LEVEL: info
      # Security
      ENABLE_HELMET: "true"
      ENABLE_COMPRESSION: "true"
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "1"
          memory: 512M
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
