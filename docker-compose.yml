services:
  db:
    image: postgres:15-alpine
    container_name: nexusflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexusflow-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # MinIO (S3-compatible object storage)
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: nexusflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"     # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create default bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: nexusflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb myminio/$${S3_BUCKET:-nexusflow-uploads} --ignore-existing;
      mc anonymous set download myminio/$${S3_BUCKET:-nexusflow-uploads}/public;
      echo 'Bucket created successfully';
      exit 0;
      "

  # ===========================================
  # NexusFlow API
  # ===========================================
  # Uncomment to run API in Docker (production/staging)
  # For local development, run `npm run start:dev` instead
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: nexusflow-api
    restart: unless-stopped
    profiles:
      - api  # Only starts with: docker-compose --profile api up
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      # Database
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      # Redis
      REDIS_URL: redis://redis:6379
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      # Cache
      CACHE_TTL_DEFAULT: ${CACHE_TTL_DEFAULT:-300}
      CACHE_TTL_DASHBOARD: ${CACHE_TTL_DASHBOARD:-300}
      # Storage (MinIO)
      STORAGE_TYPE: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-nexusflow-uploads}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Queue
      QUEUE_ENABLED: "true"
      QUEUE_PREFIX: ${QUEUE_PREFIX:-nexusflow}
      # Rate Limiting
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-60}
      # Frontend URL (for CORS, emails)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      # Email (optional)
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data: